name: FocusOne
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    SWIFT_VERSION: 5.9

targets:
  FocusOne:
    type: application
    platform: iOS
    sources:
      - path: FocusOne
      - path: Widgets/WidgetDataStore.swift
        buildPhase: sources
    resources:
      - path: FocusOne/Persistence/Model.xcdatamodeld
      - path: FocusOne/Localization
      - path: FocusOne/Resources/Assets.xcassets
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: FocusOne/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        PRODUCT_BUNDLE_IDENTIFIER: fr.beabot.FocusOne
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: FocusOne/Resources/FocusOne.Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: FocusOne/Resources/FocusOne.entitlements
    dependencies:
      - target: FocusOneWidget

  FocusOneWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: FocusOne/App/AppConfig.swift
        buildPhase: sources
      - path: FocusOne/Domain/Services/Localization.swift
        buildPhase: sources
    resources:
      - path: FocusOne/Localization
    configFiles:
      Debug: Config/Widget.Debug.xcconfig
      Release: Config/Widget.Release.xcconfig
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: FocusOneWidget/Resources/Info.plist
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        PRODUCT_BUNDLE_IDENTIFIER: fr.beabot.FocusOne.widget
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: FocusOneWidget/FocusOneWidget.Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: FocusOneWidget/FocusOneWidget.entitlements

schemes:
  FocusOne:
    shared: true
    build:
      targets:
        FocusOne: all
        FocusOneWidget:
          - build
    run:
      config: Debug
      executable: FocusOne
  FocusOneWidget:
    shared: true
    build:
      targets:
        FocusOne: all
        FocusOneWidget:
          - build
    run:
      config: Debug
      executable: FocusOne
