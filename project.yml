name: FocusOne
options:
  bundleIdPrefix: com.benoit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    SWIFT_VERSION: 5.9

targets:
  FocusOne:
    type: application
    platform: iOS
    sources:
      - path: FocusOne
      - path: Widgets/WidgetDataStore.swift
        buildPhase: sources
    resources:
      - path: FocusOne/Persistence/Model.xcdatamodeld
      - path: FocusOne/Localization
      - path: FocusOne/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benoit.focusone
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: FocusOne/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: NO
        CODE_SIGN_ENTITLEMENTS: FocusOne/Resources/FocusOne.entitlements
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
    dependencies:
      - target: FocusOneWidget

  FocusOneWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: FocusOne/App/AppConfig.swift
        buildPhase: sources
      - path: FocusOne/Domain/Services/Localization.swift
        buildPhase: sources
    resources:
      - path: FocusOne/Localization
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benoit.focusone.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: FocusOneWidget/Resources/Info.plist
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: FocusOneWidget/FocusOneWidget.entitlements
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0

schemes:
  FocusOne:
    shared: true
    build:
      targets:
        FocusOne: all
        FocusOneWidget:
          - build
    run:
      config: Debug
      executable: FocusOne
  FocusOneWidget:
    shared: true
    build:
      targets:
        FocusOne: all
        FocusOneWidget:
          - build
    run:
      config: Debug
      executable: FocusOne
